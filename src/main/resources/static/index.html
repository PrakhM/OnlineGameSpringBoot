<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PixelRealm</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #2c2c2c;
            color: #eee;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 1.2rem;
            color: #d4af37;
            padding: 8px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #game-area {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            padding: 0 12px 8px;
        }

        #gameCanvas {
            border: 3px solid #d4af37;
            image-rendering: pixelated;
            display: block;
        }

        #sidebar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 240px;
        }

        #players-panel {
            background: #3a3a3a;
            border: 2px solid #d4af37;
            border-radius: 4px;
            padding: 8px;
        }

        #players-panel h3 {
            font-size: 0.9rem;
            color: #d4af37;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #player-list { font-size: 0.9rem; line-height: 1.8; }

        .player-entry::before {
            content: '▶ ';
            font-size: 0.6rem;
        }

        #chat-panel {
            background: #3a3a3a;
            border: 2px solid #d4af37;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        #chat-panel h3 {
            font-size: 0.9rem;
            color: #d4af37;
            padding: 8px;
            border-bottom: 1px solid #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            font-size: 0.9rem;
            line-height: 1.5;
            max-height: 260px;
            min-height: 260px;
            background: #2f2f2f;
        }

        .msg-chat { color: #eee; }
        .msg-chat .sender { font-weight: bold; color: #d4af37; }
        .msg-join { color: #7ed957; font-style: italic; }
        .msg-leave { color: #ff6b6b; font-style: italic; }

        #chat-input-area {
            display: flex;
            border-top: 1px solid #555;
        }

        #chat-input {
            flex: 1;
            background: #2c2c2c;
            border: 2px solid #d4af37;
            color: #eee;
            padding: 6px 8px;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
        }

        #chat-send {
            background: #d4af37;
            border: none;
            color: #2c2c2c;
            padding: 6px 10px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
        }

        #chat-send:hover { background: #b8962e; }

        #controls-hint {
            font-size: 0.65rem;
            color: #888;
            text-align: center;
            padding-bottom: 4px;
        }

        #login-overlay {
            position: fixed; inset: 0;
            background: rgba(44,44,44,0.97);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            gap: 16px;
        }

        #login-overlay h2 {
            color: #d4af37;
            font-size: 1.8rem;
            letter-spacing: 4px;
        }

        #login-overlay p { color: #aaa; font-size: 0.85rem; }

        #username-input {
            background: #3a3a3a;
            border: 2px solid #d4af37;
            color: #eee;
            padding: 10px 16px;
            font-family: inherit;
            font-size: 1rem;
            text-align: center;
            outline: none;
            border-radius: 4px;
            width: 260px;
        }

        #join-btn {
            background: #d4af37;
            border: none;
            color: #2c2c2c;
            padding: 10px 32px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        #join-btn:hover { background: #b8962e; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2>PIXELREALM</h2>
    <p>What do you call yourself?</p>
    <input id="username-input" type="text" maxlength="12" placeholder="Enter.." autofocus />
    <button id="join-btn">ENTER WORLD</button>
</div>

<h1>PIXELREALM</h1>
<div id="game-area">
    <canvas id="gameCanvas"></canvas>
    <div id="sidebar">
        <div id="players-panel">
            <h3>People of this world</h3>
            <div id="player-list"></div>
        </div>
        <div id="chat-panel">
            <h3>Chat</h3>
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input id="chat-input" type="text" maxlength="80" placeholder="Say something..." />
                <button id="chat-send">➤</button>
            </div>
        </div>
    </div>
</div>
<div id="controls-hint">Arrow keys or WASD to move</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="/js/archery.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
